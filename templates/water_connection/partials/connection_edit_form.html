<form id="connection-edit-form"
      class="modal-content needs-validation"
      hx-post="{% url 'connection_edit_view' connection.id %}"
      hx-target="#connection-edit-form"
      hx-swap="outerHTML"
      novalidate>
  {% csrf_token %}

  <div class="modal-header">
    <h5 class="modal-title">Editar Acometida</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>

  <div class="modal-body">

    <!-- OWNER (solo lectura) -->
    <div class="mb-3">
      <label class="form-label">Propietario:</label>
      <input type="text" class="form-control" 
             value="{{ connection.owner.first_name }} {{ connection.owner.last_name }}" 
             readonly disabled>
      <input type="hidden" name="owner" value="{{ connection.owner.id }}">
    </div>

    <!-- RESPONSIBLE (editable con búsqueda) -->
    <div class="mb-3 position-relative" id="responsible-search-wrap">
      <label for="responsible_search_input" class="form-label">
        Responsable: <span class="text-danger">*</span>

        <!-- AYUDA -->
        <a href="#" class="btn btn-link p-0 align-baseline"
           tabindex="0"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="Selecciona el responsable de la acometida. Puedes buscar por nombre o DUI, y debes elegir una opción de la lista para que quede asignado correctamente."
        >
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>

      <div class="input-group">
        <input type="text"
              name="qq"
              id="responsible_search_input"
              class="form-control"
              placeholder="Buscar responsable (nombre o DUI)..."
              autocomplete="off"
              value="{% if connection.responsible %}{{ connection.responsible.first_name }} {{ connection.responsible.last_name }}{% endif %}"
              hx-get="{% url 'partner_search_view' %}"
              hx-trigger="keyup changed delay:200ms"
              hx-target="#responsible-results"
              hx-swap="innerHTML"
              hx-include="#responsible_search_input"
              hx-vals='{"target": "responsible"}'>

        <input type="hidden" name="responsible" id="id_responsible" 
               value="{% if connection.responsible %}{{ connection.responsible.id }}{% endif %}">

        <button class="btn btn-outline-secondary" type="button" id="responsible-clear-btn" hidden
          onclick="clearPartnerField('responsible')">✕</button>

        <div class="invalid-feedback">Debes seleccionar un responsable.</div>
      </div>

      <div id="responsible-results" class="w-100 position-absolute"
           style="z-index:1000; top:100%; left:0;"></div>
    </div>

    <!-- DATE (solo lectura) -->
    <div class="mb-3">
      <label for="{{ form.date.id_for_label }}" class="form-label">Fecha de adquisición:</label>

      <input type="text"
             class="form-control mb-2"
             value="{{ form.instance.date|date:'d-m-Y' }}"
             readonly disabled>
    </div>

    <!-- DESCRIPTION -->
    <div class="mb-3">
      <label for="{{ form.description.id_for_label }}" class="form-label">
        Descripción: <span class="text-danger">*</span>

        <!-- AYUDA -->
        <a href="#" class="btn btn-link p-0 align-baseline"
           tabindex="0"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="Describe claramente la ubicación o referencia de la acometida. Ejemplo: 'Conexión principal casa #7'."
        >
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>

      {{ form.description }}
      <div class="invalid-feedback">Agrega una descripción válida.</div>
    </div>

    <!-- ACQUISITION PRICE -->
    <div class="mb-3">
      <label for="{{ form.acquisition_price.id_for_label }}" class="form-label">
        Precio de adquisición:
      </label>

      {{ form.acquisition_price }}
      <div class="invalid-feedback">Ingresa un monto válido.</div>
    </div>

    <p class="small mb-0">
      <span class="text-danger">*</span>
      <span class="text-muted">Campos obligatorios</span>
    </p>

  </div>

  <div class="modal-footer justify-content-between">
    <button type="submit" class="btn btn-success">Guardar</button>
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>

<script>
/* 1) Asegura que el alert quede sobre el modal */
(function ensureZIndex() {
  const style = document.createElement('style');
  style.textContent = `.swal2-container{ z-index:20000 !important }`;
  document.head.appendChild(style);
})();

/* 2) Lógica de confirmación + alerta de éxito tras guardar */
(function () {
  function bindConfirm(form){
    if (!form || form.__confirmBound) return;
    form.__confirmBound = true;

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();

      // Validación mínima: responsable
      const responsibleId = document.getElementById('id_responsible')?.value?.trim();
      const responsibleInput = document.getElementById('responsible_search_input');
      if (!responsibleId) {
        responsibleInput?.classList.add('is-invalid');
        responsibleInput?.focus();
        return;
      } else {
        responsibleInput?.classList.remove('is-invalid');
      }

      // Validación nativa del form si aplica
      if (typeof form.checkValidity === 'function' && !form.checkValidity()) {
        form.classList.add('was-validated');
        return;
      }

      if (!window.Swal || typeof Swal.fire !== 'function') {
        console.error('SweetAlert2 no está disponible en el layout.');
        return;
      }

      Swal.fire({
        title: '¿Estás seguro?',
        text: 'Se guardará la acometida seleccionada.',
        icon: 'question',
        showCancelButton: true,
        customClass: {
          confirmButton: 'btn btn-success',
          cancelButton: 'btn btn-secondary'
        },
        confirmButtonText: 'Sí, guardar',
        cancelButtonText: 'Cancelar'
      }).then((result) => {
        if (!result.isConfirmed) return;

        const submitBtn = form.querySelector('[type="submit"]');
        submitBtn && (submitBtn.disabled = true);

        const url  = form.getAttribute('hx-post') || form.action;
        const csrf = form.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
        const fd   = new FormData(form);

        // ---- Envío con HTMX si existe
        if (window.htmx && typeof htmx.ajax === 'function') {
          const xhr = htmx.ajax('POST', url, {
            target: '#connection-edit-form',
            swap: 'outerHTML',
            headers: { 'X-CSRFToken': csrf },
            values: Object.fromEntries(fd.entries())
          });

          xhr.addEventListener('loadend', function(){
            submitBtn && (submitBtn.disabled = false);

            // Si el servidor respondió JSON con {state:"success", message:"..."} mostramos la alerta
            try {
              const ct = xhr.getResponseHeader('Content-Type') || '';
              if (ct.includes('application/json')) {
                const data = JSON.parse(xhr.responseText || '{}');
                if (data && data.state === 'success') {
                  Swal.fire({
                    icon: 'success',
                    title: '¡Éxito!',
                    text: data.message || 'Guardado exitosamente.',
                    timer: 2000,
                    showConfirmButton: false
                  });
                }
              }
            } catch (_) { /* no-op */ }
          });

        } else {
          // ---- Fallback sin HTMX
          fetch(url, { method: 'POST', headers: { 'X-CSRFToken': csrf }, body: fd })
            .then(async (r) => {
              const ct = r.headers.get('content-type') || '';
              if (ct.includes('application/json')) {
                const data = await r.json();
                if (data && data.state === 'success') {
                  Swal.fire({
                    icon: 'success',
                    title: '¡Éxito!',
                    text: data.message || 'Guardado exitosamente.',
                    timer: 2000,
                    showConfirmButton: false
                  });
                }
                return null; // No hay HTML que reemplazar
              } else {
                return r.text();
              }
            })
            .then((html) => {
              if (!html) return;
              const tmp = document.createElement('div'); tmp.innerHTML = html;
              const node = tmp.firstElementChild || tmp;
              form.replaceWith(node);
            })
            .catch(err => console.error('Error al guardar:', err))
            .finally(() => { submitBtn && (submitBtn.disabled = false); });
        }
      });
    }, true); // fase de captura
  }

  // Escanea y vincula al cargar y tras swaps de HTMX
  function scan(){ bindConfirm(document.getElementById('connection-edit-form')); }
  document.addEventListener('DOMContentLoaded', scan);
  document.body.addEventListener('htmx:load', scan);

  const popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
    popoverTriggerList.forEach(function (popoverTriggerEl) {
      new bootstrap.Popover(popoverTriggerEl, {
        customClass: 'popover-sm' 
      });
    });
})();
</script>
