<div id="connection-success-fragment" class="p-4">
  <div class="alert alert-success d-flex align-items-center" role="alert">
    <i class="fas fa-check-circle me-2"></i>
    <div><strong>¡Listo!</strong> La acometida se guardó correctamente.</div>
  </div>

  <div class="d-flex gap-2">
    <a href="{% url 'connections_list' %}" class="btn btn-success">Ver acometidas</a>
    <button type="button" class="btn btn-outline-secondary" onclick="window.location.reload()">Actualizar página</button>
  </div>
</div>

<script>
  // Cierra el modal
  (function forceCloseModal(modalId) {
    const el = document.getElementById(modalId);
    if (!el) return;
    try { bootstrap.Modal.getOrCreateInstance(el).hide(); } catch (_) {}
    el.classList.remove('show');
    el.style.display = 'none';
    document.body.classList.remove('modal-open');
    document.body.style.removeProperty('padding-right');
    document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
  })('connection-modal'); // <-- usa el ID real de tu modal

  // Mostrar SweetAlert si existe, y recargar al cerrar
  if (window.Swal) {
    Swal.fire({
      icon: 'success',
      title: 'Guardado',
      text: 'La acometida se guardó correctamente.',
      timer: 1600,
      showConfirmButton: false
    }).then(() => {
      // Da un pequeño margen para terminar animaciones del modal
      setTimeout(() => window.location.reload(), 150);
    });
  } else {
    // Sin SweetAlert: deja ver el alert Bootstrap y luego recarga
    setTimeout(() => window.location.reload(), 1200);
  }

  // Limpieza: elimina este fragmento para que no quede en el DOM
  setTimeout(function () {
    const wrap = document.getElementById('connection-success-fragment');
    if (wrap) wrap.remove();
  }, 0);
</script>
