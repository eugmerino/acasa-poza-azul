<form id="connection-form"
      class="modal-content needs-validation"
      hx-post="{% url 'connection_create_view' %}"
      hx-target="#connection-form"
      hx-swap="outerHTML"
      novalidate>
  {% csrf_token %}

  <div class="modal-header">
    <h5 class="modal-title">Agregar Acometida</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
  </div>

  <div class="modal-body">

    <!-- OWNER -->
    <div class="mb-3 position-relative" id="owner-search-wrap">
      <label for="owner_search_input" class="form-label">
        Propietario: <span class="text-danger">*</span>

        <!-- Ayuda -->
        <a href="#" class="btn btn-link p-0 align-baseline"
           tabindex="0"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="Busca y selecciona al socio propietario de la acometida. Debes escoger uno antes de guardar."
        >
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>

      <div class="input-group">
        <input type="text"
              name="qq"
              id="owner_search_input"
              class="form-control"
              placeholder="Buscar socio (nombre o DUI)..."
              autocomplete="off"
              hx-get="{% url 'partner_search_view' %}"
              hx-trigger="keyup changed delay:200ms"
              hx-target="#owner-results"
              hx-swap="innerHTML"
              hx-include="#owner_search_input"
              hx-vals='{"target": "owner"}'>

        <input type="hidden" name="owner" id="id_owner">

        <button class="btn btn-outline-secondary" type="button" id="owner-clear-btn"
                hidden onclick="clearPartnerField('owner')">✕</button>

        <div class="invalid-feedback">Debes seleccionar un propietario.</div>
      </div>

      <div id="owner-results"
           class="w-100 position-absolute"
           style="z-index:1000; top:100%; left:0;"></div>
    </div>

    <!-- RESPONSIBLE (solo visible al editar) -->
    <div class="mb-3" id="responsible-field" style="display: none;">
      <label class="form-label">
        Responsable
        <a href="#" class="btn btn-link p-0 align-baseline"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="Solo se muestra al editar. Permite cambiar el responsable cuando sea necesario.">
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>
      {{ form.responsible }}
    </div>

    <!-- DATE -->
    <div class="mb-3">
      <label for="{{ form.date.id_for_label }}" class="form-label">
        Fecha de adquisición: <span class="text-danger">*</span>

        <!-- Ayuda -->
        <a href="#" class="btn btn-link p-0 align-baseline"
           tabindex="0"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="Selecciona la fecha exacta en que se adquirió la acometida. Este dato es obligatorio."
        >
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>
      {{ form.date }}
      <div class="invalid-feedback">Indica la fecha de adquisición.</div>
    </div>

    <!-- DESCRIPTION -->
    <div class="mb-3">
      <label for="{{ form.description.id_for_label }}" class="form-label">
        Descripción: <span class="text-danger">*</span>

        <!-- Ayuda -->
        <a href="#" class="btn btn-link p-0 align-baseline"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="Indica una breve descripción de la acometida, Ejemplo: 'Conexión principal casa #7'."
        >
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>
      {{ form.description }}
      <div class="invalid-feedback">Agrega una descripción válida.</div>
    </div>

    <!-- ACQUISITION PRICE -->
    <div class="mb-3">
      <label for="{{ form.acquisition_price.id_for_label }}" class="form-label">
        Precio de adquisición:

        <!-- Ayuda -->
        <a href="#" class="btn btn-link p-0 align-baseline"
           data-bs-toggle="popover"
           data-bs-trigger="hover focus"
           data-bs-placement="right"
           data-bs-content="El precio es asignado por ACASA."
        >
          <i class="fa-solid fa-circle-info fa-xs text-primary"></i>
        </a>
      </label>
      {{ form.acquisition_price }}
      <div class="invalid-feedback">Ingresa un monto válido.</div>
    </div>

    <!-- NOTA CAMPOS OBLIGATORIOS -->
    <p class="small mb-0">
      <span class="text-danger">*</span>
      <span class="text-muted">Campos obligatorios</span>
    </p>
  </div>

  <div class="modal-footer justify-content-between">
    <button type="submit" class="btn btn-success">Guardar</button>
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
  </div>
</form>

<script>
/* --- Seleccionar un partner --- */
function selectPartner(id, name, target) {
  const input = document.getElementById(`${target}_search_input`);
  const hidden = document.getElementById(`id_${target}`);
  const clearBtn = document.getElementById(`${target}-clear-btn`);
  const results = document.getElementById(`${target}-results`);

  if (input && hidden) {
    input.value = name;
    hidden.value = id;
    input.disabled = true;
    if (clearBtn) clearBtn.hidden = false;
    input.classList.remove("is-invalid");
  }
  if (results) results.innerHTML = '';
}

/* --- Limpiar el partner seleccionado --- */
function clearPartnerField(target) {
  const input = document.getElementById(`${target}_search_input`);
  const hidden = document.getElementById(`id_${target}`);
  const results = document.getElementById(`${target}-results`);
  const clearBtn = document.getElementById(`${target}-clear-btn`);

  if (input && hidden) {
    input.value = '';
    hidden.value = '';
    input.disabled = false;
    input.focus();
    input.classList.remove("is-invalid");
  }
  if (results) results.innerHTML = '';
  if (clearBtn) clearBtn.hidden = true;
}

/* --- Validar y confirmar antes de enviar --- */
(function () {
  const form = document.getElementById('connection-form');
  if (!form) return;

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    e.stopImmediatePropagation();

    // Validación básica
    const ownerInput = document.getElementById('owner_search_input');
    const ownerHidden = document.getElementById('id_owner');
    const dateField = form.querySelector('input[name="date"], #id_date');
    const descriptionField = form.querySelector('textarea[name="description"], #id_description');

    ownerInput?.classList.remove('is-invalid');
    dateField?.classList.remove('is-invalid');
    descriptionField?.classList.remove('is-invalid');

    let valido = true;
    if (!ownerHidden?.value) { ownerInput?.classList.add('is-invalid'); valido = false; }
    if (!dateField?.value) { dateField?.classList.add('is-invalid'); valido = false; }
    if (!descriptionField?.value?.trim()) { descriptionField?.classList.add('is-invalid'); valido = false; }

    if (!valido) {
      (ownerInput?.classList.contains('is-invalid') ? ownerInput :
        dateField?.classList.contains('is-invalid') ? dateField : descriptionField)?.focus();
      return;
    }

    // Confirmación: Guardar 
    Swal.fire({
      title: '¿Estás seguro?',
      text: 'Se guardará la acomedita seleccionada.',
      icon: 'question',
      showCancelButton: true,
      customClass: {
        confirmButton: 'btn btn-success',
        cancelButton: 'btn btn-secondary'
      },
      confirmButtonText: 'Sí, guardar',
      cancelButtonText: 'Cancelar'
    }).then((result) => {
      // Si cancela: no mostrar nada
      if (!result.isConfirmed) return;

      const url = form.getAttribute('hx-post') || form.action;
      const csrf = form.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
      const formData = new FormData(form);

      // Con HTMX
      if (window.htmx && typeof htmx.ajax === 'function') {
        const xhr = htmx.ajax('POST', url, {
          target: form,
          swap: 'outerHTML',
          headers: { 'X-CSRFToken': csrf },
          values: Object.fromEntries(formData.entries())
        });

        xhr.addEventListener('loadend', function () {
          if (xhr.status >= 200 && xhr.status < 300) {
            // ÉXITO: solo un mensaje como en tu captura
            Swal.fire({
              title: 'Guardado',
              text: 'La acometida se guardó correctamente.',
              icon: 'success',
              buttonsStyling: false,
              customClass: {
                actions: 'mt-4',        // separa el botón OK del contenido
                confirmButton: 'btn btn-primary' // cambia el OK (pon tu clase/estilo preferido)
              }
            });
          } else {
            Swal.fire({
              title: 'Error',
              text: 'No se pudo guardar. Intenta nuevamente.',
              icon: 'error',
              buttonsStyling: false,
              customClass: {
                actions: 'mt-4',
                confirmButton: 'btn btn-danger'
              }
            });
          }
        });
      } else {
        // Fallback sin HTMX
        fetch(url, { method: 'POST', headers: { 'X-CSRFToken': csrf }, body: formData })
          .then(r => r.text())
          .then(html => {
            const tmp = document.createElement('div'); tmp.innerHTML = html;
            const node = tmp.firstElementChild || tmp;
            form.replaceWith(node);
            Swal.fire({
              title: 'Guardado',
              text: 'La acometida se guardó correctamente.',
              icon: 'success',
              buttonsStyling: false,
              customClass: {
                actions: 'mt-4',
                confirmButton: 'btn btn-primary'
              }
            });
          })
          .catch(() => {
            Swal.fire({
              title: 'Error',
              text: 'No se pudo guardar. Intenta nuevamente.',
              icon: 'error',
              buttonsStyling: false,
              customClass: {
                actions: 'mt-4',
                confirmButton: 'btn btn-danger'
              }
            });
          });
      }
    });
  });

  const popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
  popoverTriggerList.forEach(function (popoverTriggerEl) {
    new bootstrap.Popover(popoverTriggerEl, {
      customClass: 'popover-sm' 
    });
  });

})();
</script>
