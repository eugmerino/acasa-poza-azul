{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Transacciones de {{ month }} {{ year }}</h4>
        <button class="btn btn-primary"
                hx-get="{% url 'transaction_create' %}"
                hx-target="#modal-body"
                hx-trigger="click"
                data-bs-toggle="modal"
                data-bs-target="#modalForm">
            Nueva transacción
        </button>
    </div>

    <!-- Buscador -->
    <form hx-get="{% url 'transaction_list' %}" hx-target="#transaction-table" hx-push-url="true" class="mb-3">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Buscar..." value="{{ request.GET.search }}">
            <button class="btn btn-outline-primary" type="submit">Buscar</button>
        </div>
    </form>

    <!-- Tabla -->
    <div id="transaction-table">
        {% include 'partials/finance/transaction_table.html' %}
    </div>

    <div class="mt-3 text-end">
        <a href="{% url 'transaction_list_all' %}" class="btn btn-outline-secondary">
            Ver todas las transacciones
        </a>
    </div>
</div>

<!-- Modal HTMX -->
<div class="modal fade" id="modalForm" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" id="modal-body">
      <!-- El contenido del formulario se carga aquí -->
    </div>
  </div>
</div>
{% endblock %}
