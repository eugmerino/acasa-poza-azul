<tr id="community-{{ community.id }}">
    <td>{{ community.name }}</td>
    <td>{{ community.description }}</td>
    <td class="text-center">
        <div class="btn-group">
            {% if perms.project.add_community %}
            <button
                type="button"
                class="btn btn-outline-primary"
                hx-get="{% url 'community_edit' community.id %}"
                hx-target="#community-content-modal"
                hx-trigger="click"
                data-bs-toggle="modal"
                data-bs-target="#communityModal"
            ><i class="fas fa-edit"></i></button>
            {% endif %}

        </div>
    </td>
</tr>
