<tr id="repair-{{ repair.id }}">
    <td>{{ repair.report_title }}</td>
    <td>{{ repair.community.name  }}</td>
    <td>{{ repair.repair_date  }}</td>
    <td>
        {% if repair.is_paid %}
        <span class="badge bg-success">Pagado</span>
        {% else %}
        <span class="badge bg-secondary">Sin pagar</span>   
        {% endif %}
    </td>
    <td class="text-center">
        <div class="btn-group">
            <button
                type="button"
                class="btn btn-outline-primary dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-expanded="false"
            >
                <span class="visually-hidden">Acciones</span>
            </button>
            {% if not repair.is_paid %}
            <ul class="dropdown-menu">
                <li>
                    <a class="dropdown-item"
                        href="#"
                        hx-get="{% url 'repair_pay_edit' repair.id %}"
                        hx-target="#main-container"
                        hx-swap="innerHTML">
                            <i class="fa-solid fa-pen-to-square me-1"></i> Registrar
                    </a>
                </li>
            </ul>
            {% endif %}
        </div>
    </td>
</tr>
