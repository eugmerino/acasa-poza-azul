<div class="row mt-4 mb-2 text-center">
  <div class="col-12">
    <h1 class="h3">Gestión de pagos por reparaciones de daño a tuberias</h1>
  </div>
</div>

<div class="table-container rounded-4 shadow p-4">    
  <div class="header-controls d-flex justify-content-end">
    {% include "partials/search_table.html" with hx_url=repair_pay_search_url hx_target="#table-content" placeholder="Buscar Pago..." %}
  </div>
  {% include "repair/partials/repair_pay_table.html" %}
</div>

<script>
  document.body.addEventListener("repairPayEdited", () => {
    Swal.fire({
      title: "¡Pago registrado!",
      text: "El pago fue registrado correctamente.",
      icon: "success",
      timer: 2000,
      showConfirmButton: false
    });
  });
</script>
