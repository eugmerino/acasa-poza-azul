<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restablecer contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h3>Establecer nueva contraseña</h3>
      {% if validlink %}
      <form method="post" id="resetPasswordForm">
        {% csrf_token %}
        <div class="mb-3">
          <label for="password1" class="form-label">Nueva contraseña</label>
          <input type="password" name="password1" id="password1" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="password2" class="form-label">Confirmar contraseña</label>
          <input type="password" name="password2" id="password2" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Restablecer contraseña</button>
        <a href="{% url 'login' %}" class="btn btn-secondary">Cancelar</a>
      </form>
      {% else %}
      <div class="alert alert-danger">El enlace de restablecimiento no es válido o ha expirado.</div>
      <a href="{% url 'login' %}" class="btn btn-primary">Volver al inicio</a>
      {% endif %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.getElementById("resetPasswordForm")?.addEventListener("submit", function(e) {
    e.preventDefault(); // evita el submit por defecto

    const password1 = document.getElementById("password1").value;
    const password2 = document.getElementById("password2").value;

    // Expresión regular: mínimo 8 caracteres, al menos una letra, un número y un caracter especial
    const regex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;

    if (password1 !== password2) {
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: 'Las contraseñas no coinciden.',
        });
        return;
    }

    if (!regex.test(password1)) {
        Swal.fire({
            icon: 'error',
            title: 'Contraseña insegura',
            html: 'La contraseña debe tener al menos 8 caracteres e incluir:<br>- Letras<br>- Números<br>- Un carácter especial (@$!%*#?&)',
        });
        return;
    }

    // Si pasa la validación, envía el formulario
    this.submit();
});
</script>
</body>
</html>
