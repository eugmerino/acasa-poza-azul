{% extends 'base_auth.html' %}
{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<h5 class="text-center mb-3">Restablecer contraseña</h5>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
  <a href="{% url 'login' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
</form>
{% endblock %}
