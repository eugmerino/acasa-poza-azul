{% extends 'base.html' %}
{% load static %}
{% block title %}
  Tarifas | ACASA Poza Azul
{% endblock %}

{% block content %}
  <div class="mt-4 mb-4 text-center">
    <h1 class="h3">Gestión de Tarifas</h1>
  </div>
  <div class="table-container rounded-4 shadow p-4 mb-5">
    <div class="header-controls">
      <a href="{% url 'fee_create_form' %}" class="btn btn-success" role="button"><i class="fas fa-plus me-1"></i> Agregar Nueva Tarifa</a>
    </div>
    <div class="table-responsive rounded-3">
      <table id="tabla-fees" class="table table-striped table-hover table-azul-oscuro align-middle rounded-bottom rounded-3">
        <thead class="">
          <tr>
            <th scope="col">Descripción</th>
            <th scope="col">Fecha Aprobación</th>
            <th scope="col">Estado</th>
            <th scope="col">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-tarifas"></tbody>
      </table>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    $(document).ready(function () {
      $('#tabla-fees').DataTable({
        ajax: "{% url 'fees_json' %}",
        columns: [
          { data: 'short_description' },
          { data: 'approval_date' },
          {
            data: 'isActive',
            render: function (data, type, row) {
              if (data === 'Activa') {
                return '<span class="badge bg-success">Activa</span>'
              } else {
                return '<span class="badge bg-danger">Inactiva</span>'
              }
            }
          },
          {
            data: null,
            render: function (data, type, row) {
              return `
                <div class="d-flex gap-2">
                  <!-- Botón Ver -->
                  <a href="/ruta/ver/${row.id}/" class="btn btn-sm btn-secondary" title="Ver">
                    <i class="fa-solid fa-eye"></i>
                  </a>
                  <!-- Botón Editar -->
                  <a href="/ruta/editar/${row.id}/" class="btn btn-sm btn-primary" title="Editar">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </a>
                </div>
              `;
            }
          }
        ],
        pageLength: 10,
        lengthMenu: [
          [5, 10, 25],
          [5, 10, 25]
        ],
        language: {
          decimal: ',',
          thousands: '.',
          processing: 'Procesando...',
          search: 'Buscar:',
          lengthMenu: 'Mostrar _MENU_ registros',
          info: 'Mostrando _START_ a _END_ de _TOTAL_ registros',
          infoEmpty: 'Mostrando 0 a 0 de 0 registros',
          infoFiltered: '(filtrado de _MAX_ registros totales)',
          loadingRecords: 'Cargando...',
          zeroRecords: 'No se encontraron resultados',
          emptyTable: 'No hay datos disponibles en la tabla',
          paginate: {
            first: 'Primero',
            previous: 'Anterior',
            next: 'Siguiente',
            last: 'Último'
          },
          aria: {
            sortAscending: ': activar para ordenar ascendente',
            sortDescending: ': activar para ordenar descendente'
          }
        }
      })
    })
  </script>
{% endblock %}
