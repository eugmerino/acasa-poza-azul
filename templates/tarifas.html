{% extends "base.html" %}
{% load static %}
{% block title %}Inicio | ACASA Poza Azul{% endblock %}

{% block content %}
<div class="container">
    <div class="mt-4 mb-4 text-center">
        <h2>Gestión de Tarifas</h2>
    </div>
    
    <div class="table-container rounded-4 shadow p-4">
        <div class="header-controls">
            <button id="btn-abrir-crud" class="btn btn-success">
                <i class="fas fa-plus me-1"></i> Agregar Nueva Tarifa
            </button>
            <div class="input-group search-input-group">
                <input type="text" class="form-control" placeholder="Buscar tarifas...">
                <button class="btn btn-outline-secondary" type="button"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="table-responsive rounded-3">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Descripción</th>
                        <th scope="col">Fecha Aprobación</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-tarifas">
                </tbody>
            </table>
        </div>
        <nav aria-label="Page navigation example" class="mt-3">
            <ul class="pagination justify-content-center">
                <li class="page-item disabled"><a class="page-link" href="#">Anterior</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item"><a class="page-link" href="#">Siguiente</a></li>
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
