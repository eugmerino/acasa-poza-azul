
{# 2) Cierra el modal, muestra alerta y recarga página #}
<script>
  (function(){
    try {
      Swal.fire('Guardado', 'El directivo se guardó correctamente.', 'success').then(() => {
        // Recarga la página después de cerrar la alerta
        location.reload();
      });
    } catch(_) {}

    // Cierra el modal actual si está abierto
    const modalEl = document.querySelector('.modal.show');
    if (modalEl) {
      const inst = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
      inst.hide();
    }
  })();
</script>

{# 3) Reemplaza el contenido del modal por algo liviano #}
<div class="p-3">
  <div class="alert alert-success mb-0">El directivo se guardó correctamente.</div>
</div>
