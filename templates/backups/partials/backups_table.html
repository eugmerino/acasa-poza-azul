<div class="table-responsive rounded-3" id="backups-table-content">

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Archivo</th>
                <th>Tamaño</th>
                <th>Fecha</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>

        <tbody>
        {% for bk in page_obj %}
            {% include "backups/partials/backups_row.html" %}
        {% empty %}
            <tr>
                <td colspan="4" class="text-center py-3">
                    No hay backups generados
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

    {% include "partials/paginator.html" with hx_url=backups_search_url hx_target="#backups-table-content" per_page_options=per_page_options %}
</div>
