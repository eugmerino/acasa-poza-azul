<div class="row mt-4 mb-2 text-center">
  <div class="col-12">
    <h1 class="h3">Gestión de reportes por daño a tuberias</h1>
  </div>
</div>

<div class="table-container rounded-4 shadow p-4">    
  <div class="header-controls">
    <button class="btn btn-success"
            hx-get="{% url 'report_repair_create' %}"
            hx-target="#main-container"
            hx-swap="innerHTML">
      <i class="fas fa-plus me-1"></i> Agregar Nuevo Reporte
    </button>
    {% include "partials/search_table.html" with hx_url=report_repair_search_url hx_target="#table-content" placeholder="Buscar Reporte..." %}
  </div>
  {% include "report_repair/partials/report_repair_table.html" %}
</div>

<script>
  document.body.addEventListener("reportRepairCreated", () => {
    Swal.fire({
      title: "¡Reporte guardado!",
      text: "El reporte fue creado correctamente.",
      icon: "success",
      timer: 2000,
      showConfirmButton: false
    });
  });

  document.body.addEventListener("reportRepairEdited", () => {
    Swal.fire({
      title: "Reporte actualizado!",
      text: "Los cambios del reporte fueron actualizados correctamente.",
      icon: "success",
      timer: 2000,
      showConfirmButton: false
    });
  });

  document.body.addEventListener("reportRepairDeleted", () => {
    Swal.fire({
      title: "Reporte Eliminado!",
      text: "El reporte fue eliminado correctamente.",
      icon: "success",
      timer: 2000,
      showConfirmButton: false
    });
  });

</script>
