<tr id="report-{{ report.id }}">
    <td>{{ report.report_title }}</td>
    <td>{{ report.community.name  }}</td>
    <td>{{ report.report_date  }}</td>
    <td class="text-center">
        <div class="btn-group">
            <button
                type="button"
                class="btn btn-outline-primary dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-expanded="false"
            >
                <span class="visually-hidden">Acciones</span>
            </button>
            <ul class="dropdown-menu">
                <li>
                    <a class="dropdown-item"
                        href="#"
                        hx-get="{% url 'report_repair_view' report.id %}"
                        hx-target="#main-container"
                        hx-swap="innerHTML">
                        <i class="fas fa-eye me-1"></i> Ver
                    </a>
                </li>
                <li>
                    <a class="dropdown-item"
                        href="#"
                        hx-get="{% url 'report_repair_edit' report.id %}"
                        hx-target="#main-container"
                        hx-swap="innerHTML">
                        <i class="fa-solid fa-pen-to-square me-1"></i> Editar
                    </a>
                </li>
                <li>
                    <a class="dropdown-item"
                        href="#"
                        onclick="reportRepairDelete({{ report.pk }}, '{{ csrf_token }}')">
                        <i class="fa-solid fa-trash me-1"></i> Eliminar
                    </a>
                </li>
            </ul>
        </div>
    </td>
</tr>

<script>
    function reportRepairDelete(pk, csrfToken) {

    Swal.fire({
      title: `¿Seguro que deseas eliminar este reporte?`,
      text: "Esta acción es irreversible.",
      icon: "question",
      showCancelButton: true,
      customClass: {
            confirmButton: 'btn btn-success',
            cancelButton: 'btn btn-secondary'
          },
      confirmButtonText: "Sí, continuar",
      cancelButtonText: "Cancelar"
    }).then((result) => {
      if (result.isConfirmed) {
        htmx.ajax('POST', `eliminar/${pk}/`, {
          target: "#main-container",
          swap: "innerHTML",
          headers: {
            "X-CSRFToken": csrfToken
          }
        });
      }
    });
  }
</script>
