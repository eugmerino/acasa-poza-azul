<tr id="partner-{{ partner.id }}">
    <td>{{ partner.first_name }} {{ partner.last_name }}</td>
    <td>{{ partner.community.name  }}</td>
    <td>{{ partner.dui  }}</td>
    <td>{{ partner.tel  }}</td>
    <td>
        {% if partner.is_active %}
        <span class="badge bg-success">Activo</span>
        {% else %}
        <span class="badge bg-secondary">Inactivo</span>   
        {% endif %}
    </td>
    <td class="text-center">
        <div class="btn-group">
            <button
                type="button"
                class="btn btn-outline-primary dropdown-toggle"
                data-bs-toggle="dropdown"
                aria-expanded="false"
            >
                <span class="visually-hidden">Acciones</span>
            </button>
            <ul class="dropdown-menu">
                <li>
                    <a href="#" 
                        class="dropdown-item"
                        onclick="togglePartnerStatus({{ partner.pk }}, '{{ partner.is_active }}', '{{ csrf_token }}')">
                        {% if partner.is_active %}
                            <i class="fas fa-user-slash me-2"></i> Desactivar
                        {% else %}
                            <i class="fas fa-user-check me-2"></i> Activar
                        {% endif %}
                    </a>

                </li>
                <li>
                    <a class="dropdown-item"
                        href="#"
                        hx-get="{% url 'partner_view' partner.id %}"
                        hx-target="#main-container"
                        hx-swap="innerHTML">
                        <i class="fas fa-eye me-1"></i> Ver
                    </a>
                </li>

                <li>
                    <a class="dropdown-item"
                        href="#"
                        hx-get="{% url 'partner_edit' partner.id %}"
                        hx-target="#main-container"
                        hx-swap="innerHTML">
                        <i class="fa-solid fa-pen-to-square me-1"></i> Editar
                    </a>
                </li>
            </ul>
        </div>
    </td>
</tr>
