{% extends "base.html" %}
{% load static %}

{% block title %}Reuniones Realizadas{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-4 text-center">Reuniones Realizadas</h3>

    <!-- Buscador -->
    <div class="input-group d-flex justify-content-end mb-3">
        <span class="input-group-text" id="addon-wrapping">
            <i class="fas fa-search me-1"></i>
        </span>
        <input type="text" 
               name="q" 
               class="form-control" 
               style="max-width: 300px;"
               placeholder="Buscar reuniones..."
               hx-get="{% url 'information_search' %}"
               hx-target="#main-table-content"
               hx-swap="innerHTML"
               hx-trigger="keyup changed delay:500ms">
    </div>

    <!-- Contenedor HTMX - solo la tabla se actualiza aquí -->
    <div id="main-table-content">
        {% include "partials/meet/information_table.html" %}
    </div>
</div>
{% endblock %}
