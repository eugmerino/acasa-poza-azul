<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRUD de Tarifas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 900px;
            margin: auto;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card-header-custom {
            background-color: #004085;
            color: white;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4 text-center fw-light">Gestión de Tarifas</h2>
    <div class="card mb-4">
        <div class="card-header card-header-custom">
            <h5 class="mb-0">Detalles de la Tarifa</h5>
        </div>
        <div class="card-body">
            <form id="form-crud-tarifa">
                <div class="row g-3">
                    <div class="col-md-6 mb-3">
                        <label for="fecha-aprobacion" class="form-label">Fecha de Aprobación</label>
                        <input type="date" class="form-control" id="fecha-aprobacion" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="descripcion-tarifa" class="form-label">Descripción</label>
                        <input type="text" class="form-control" id="descripcion-tarifa" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Tramos</label>
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#tramosModal">
                        <i class="fas fa-plus me-1"></i> Agregar Tramo
                    </button>
                    <div class="table-responsive mt-3">
                        <table class="table table-bordered table-sm">
                            <thead class="table-light">
                                <tr>
                                    <th>Metro Inicial</th>
                                    <th>Metro Final</th>
                                    <th>Monto Final</th>
                                    <th>Monto Adicional</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-tramos">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="activa" checked>
                    <label class="form-check-label" for="activa">Activa</label>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Guardar Tarifa</button>
                    <button type="button" class="btn btn-danger" onclick="window.close()"><i class="fas fa-times me-1"></i> Cerrar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="tramosModal" tabindex="-1" aria-labelledby="tramosModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tramosModalLabel">Agregar Nuevo Tramo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-tramo">
                    <div class="mb-3">
                        <label for="metro-inicial" class="form-label">Metro Inicial</label>
                        <input type="number" class="form-control" id="metro-inicial" required readonly>
                    </div>
                    <div class="mb-3">
                        <label for="metro-final" class="form-label">Metro Final</label>
                        <input type="number" class="form-control" id="metro-final" required>
                    </div>
                    <div class="mb-3">
                        <label for="monto-final" class="form-label">Monto Final</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" id="monto-final" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="monto-adicional" class="form-label">Monto Adicional (opcional)</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" id="monto-adicional">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary" id="btn-guardar-tramo">Guardar Tramo</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const formTramo = document.getElementById('form-tramo');
        const tablaTramos = document.getElementById('tabla-tramos');
        const btnGuardarTramo = document.getElementById('btn-guardar-tramo');
        const metroInicialInput = document.getElementById('metro-inicial');
        const tramosModal = document.getElementById('tramosModal');

        // Lógica para establecer el valor del metro inicial al abrir el modal
        tramosModal.addEventListener('show.bs.modal', function () {
            const tramosExistentes = tablaTramos.querySelectorAll('tr');
            if (tramosExistentes.length === 0) {
                // Si es el primer tramo, se establece en 0
                metroInicialInput.value = 0;
            } else {
                // Si hay tramos, se toma el valor del último metro final + 1
                const ultimoTramo = tramosExistentes[tramosExistentes.length - 1];
                const ultimoMetroFinal = parseInt(ultimoTramo.cells[1].textContent);
                metroInicialInput.value = ultimoMetroFinal + 1;
            }
        });
        
        btnGuardarTramo.addEventListener('click', function() {
            const metroInicial = parseInt(metroInicialInput.value);
            const metroFinal = parseInt(document.getElementById('metro-final').value);
            const montoFinal = document.getElementById('monto-final').value;
            const montoAdicional = document.getElementById('monto-adicional').value || '0.00';
            const tramosExistentes = tablaTramos.querySelectorAll('tr');

            // 1. Validar campos obligatorios
            if (isNaN(metroInicial) || isNaN(metroFinal) || !montoFinal) {
                alert('Por favor, completa todos los campos obligatorios.');
                return;
            }
            
            // 2. Validar que el Metro Inicial sea menor que el Metro Final
            if (metroInicial >= metroFinal) {
                alert('El Metro Final debe ser mayor que el Metro Inicial.');
                return;
            }
            
            // 3. Validar solapamiento de tramos existentes (mantenida como precaución)
            let isOverlap = false;
            tramosExistentes.forEach(row => {
                const existingMetroInicial = parseInt(row.cells[0].textContent);
                const existingMetroFinal = parseInt(row.cells[1].textContent);
                
                if ((metroInicial >= existingMetroInicial && metroInicial < existingMetroFinal) ||
                    (metroFinal > existingMetroInicial && metroFinal <= existingMetroFinal) ||
                    (metroInicial <= existingMetroInicial && metroFinal >= existingMetroFinal)) {
                    isOverlap = true;
                }
            });

            if (isOverlap) {
                alert('¡Atención! Este tramo se solapa con un tramo ya existente.');
                return;
            }
            
            // Si todas las validaciones pasan, se añade la fila
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${metroInicial}</td>
                <td>${metroFinal}</td>
                <td>$${parseFloat(montoFinal).toFixed(2)}</td>
                <td>$${parseFloat(montoAdicional).toFixed(2)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger btn-eliminar-tramo" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                </td>
            `;
            tablaTramos.appendChild(newRow);
            
            // Cierra el modal y limpia el formulario
            const modal = bootstrap.Modal.getInstance(document.getElementById('tramosModal'));
            modal.hide();
            formTramo.reset();
        });

        // Lógica para eliminar un tramo de la tabla
        tablaTramos.addEventListener('click', function(e) {
            if (e.target.closest('.btn-eliminar-tramo')) {
                const row = e.target.closest('tr');
                row.remove();
                // Actualizar la validación de metro inicial si se elimina el último tramo
                // Esta lógica se ejecuta automáticamente al abrir el modal de nuevo
            }
        });
    });
</script>

</body>
</html>
