<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACASA Poza Azul</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../templates/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <!-- Botón hamburguesa -->
    <button class="btn btn-outline-light" type="button" id="sidebar-toggler">
      <i class="fas fa-bars"></i>
    </button>
    
    <div class="ms-auto">
      <div class="dropdown">
        <a href="#" class="nav-link dropdown-toggle text-light" id="usuarioDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="fas fa-user-circle me-2"></i> Usuario
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="usuarioDropdown">
          <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i> Perfil</a></li>
          <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i> Configuración</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar active" id="sidebar">
  <div class="sidebar-header p-3">
    <h5>ACASA Poza Azul</h5>
  </div>
  <div class="sidebar-menu p-2">
    <a href="inicio.html"><i class="fas fa-home me-2"></i> Inicio</a>
    <a href="#"><i class="fas fa-users me-2"></i> Socio</a>
    <a href="#"><i class="fas fa-hand-holding-usd me-2"></i> Cobros</a>
    <a href="#"><i class="fas fa-calendar-check me-2"></i> Reuniones</a>
  </div>
</div>

<!-- Contenido principal -->
<main class="content" id="main-content">
  <div class="container-fluid pt-5 mt-3">
    <h1 class="display-5 text-secondary">Proyecto ACASA Poza Azul</h1>
    <p class="lead">Aquí va tu contenido...</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const sidebarToggler = document.getElementById("sidebar-toggler");
    const sidebar = document.getElementById("sidebar");
    const content = document.getElementById("main-content");

    sidebarToggler.addEventListener("click", function () {
      sidebar.classList.toggle("active");

      // Solo empujar contenido en pantallas grandes
      if (window.innerWidth >= 992) {
        content.classList.toggle("shifted");
      }
    });
  });
</script>
</body>
</html>
