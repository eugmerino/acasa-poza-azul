<div class="sidebar d-none d-lg-block" id="sidebar">
    <div class="sidebar-header">

        <a href="inicio.html"><i class="fas fa-home me-2"></i> Inicio</a>

        <!-- Menú principal Socio con submenú -->
        <a class="d-flex justify-content-between align-items-center" 
           data-bs-toggle="collapse" 
           href="#submenuSocio"

           aria-expanded="false" 
           aria-controls="submenuSocio"
           id="socioMenu">

            <i class="fas fa-chevron-down small"></i>
        </a>
        <div class="collapse ps-4" id="submenuSocio">
            <a href="registrar_socio.html"><i class="fas fa-user-plus me-2"></i> Registrar Socio</a>

        <a href="#cobros"><i class="fas fa-hand-holding-usd me-2"></i> Cobros</a>

         <a class="d-flex justify-content-between align-items-center"

           href="#submenuReuniones" 
           role="button" 
           aria-expanded="false"

           id="reunionMenu">

</div>

<main class="content" id="main-content">
    <div class="container-fluid">
        <div class="py-4">
            
            <div id="inicio">
                <div class="d-flex flex-column align-items-center justify-content-center" style="height: 80vh;">
                    <img src="https://via.placeholder.com/200/004085/ffffff?text=Logo" alt="Logo de ACASA Poza Azul" class="mb-4 rounded-circle border border-5 border-white shadow-lg">
                    <h1 class="display-4 text-center text-secondary fw-light">Proyecto ACASA Poza Azul</h1>
                </div>
            </div>

            <div id="cobros" class="d-none">
                <h2 class="mb-4 fw-light">Sección de Cobros</h2>
            </div>

            <!-- Ejemplo de formulario -->
            <div class="container my-5">
                <div class="card mx-auto" style="max-width: 600px;">
                    <div class="card-header">
                        <h5 class="mb-0">Formulario de Ejemplo</h5>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="row mb-3">
                                <div class="col-12 col-md-6">
                                    <label for="campo1" class="form-label">Campo 1</label>
                                    <input type="text" class="form-control" id="campo1">
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="campo2" class="form-label">Campo 2</label>
                                    <input type="text" class="form-control" id="campo2">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="campo3" class="form-label">Campo 3</label>
                                <input type="text" class="form-control" id="campo3">
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <button type="submit" class="btn btn-primary">Guardar</button>
                                <button type="reset" class="btn btn-secondary">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
       
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const sidebarToggler = document.getElementById("sidebar-toggler-mobile");
        const sidebar = document.getElementById("sidebar");

        if (sidebarToggler && sidebar) {
            sidebarToggler.addEventListener("click", function () {
                sidebar.classList.toggle("d-none");
            });
        }
    });

    const currentPath = window.location.pathname.split("/").pop();

    // Todos los enlaces de la sidebar
    const mainLinks = document.querySelectorAll('.sidebar-menu > a');
    const subLinks = document.querySelectorAll('#submenuSocio a');
    const socioMenu = document.getElementById("socioMenu");
    const submenuSocio = document.getElementById("submenuSocio");

    let socioActive = false;

    // Revisar enlaces principales
    mainLinks.forEach(link => {
        const linkPath = link.getAttribute("href");
        if (linkPath === currentPath) {
            link.classList.add("active");
        } else {
            link.classList.remove("active");
        }
    });

    // Revisar submenú Socio
    subLinks.forEach(link => {
        const linkPath = link.getAttribute("href");
        if (linkPath === currentPath) {
            link.classList.add("active");
            socioActive = true;
        } else {
            link.classList.remove("active");
        }
    });

    // Si alguna opción de socio está activa -> abrir submenú y marcar Socio
    if (socioActive) {
        submenuSocio.classList.add("show");
        socioMenu.classList.add("active");
    }
</script>

</body>
</html>
