<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACASA Poza Azul</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../templates/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <!-- Botón hamburguesa -->
    <button class="btn btn-outline-light" type="button" id="sidebar-toggler">
      <i class="fas fa-bars"></i>
    </button>
    
    <div class="ms-auto">
      <div class="dropdown">
        <a href="#" class="nav-link dropdown-toggle text-light" id="usuarioDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="fas fa-user-circle me-2"></i> Nombre de Usuario
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="usuarioDropdown">
          <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i> Perfil</a></li>
          <li><a class="dropdown-item" href="#"><i class="fas fa-info-circle me-2"></i> Información</a></li>
          <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i> Configuración</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<div class="sidebar active" id="sidebar">
  <div class="sidebar-header p-3">
    <h5>ACASA Poza Azul</h5>
  </div>
  <div class="sidebar-menu p-2">
    <a href="inicio.html"><i class="fas fa-home me-2"></i> Inicio</a>

    <!-- Menú Socio con submenú -->
    <a class="d-flex justify-content-between align-items-center"
       data-bs-toggle="collapse"
       href="#submenuSocio"
       role="button"
       aria-expanded="false"
       aria-controls="submenuSocio"
       id="socioMenu">
      <span><i class="fas fa-users me-2"></i> Socio</span>
      <i class="fas fa-chevron-down small"></i>
    </a>
    <div class="collapse ps-4" id="submenuSocio">
      <a href="registrar_socio.html"><i class="fas fa-user-plus me-2"></i> Registrar</a>
      <a href="lista_socios.html"><i class="fas fa-list me-2"></i> Lista de Socios</a>
    </div>

    <a href="#cobros"><i class="fas fa-hand-holding-usd me-2"></i> Cobros</a>

    <a class="d-flex justify-content-between align-items-center"
       data-bs-toggle="collapse"
       href="#submenuReuniones"
       role="button"
       aria-expanded="false"
       aria-controls="submenuReuniones"
       id="reunionMenu">
      <span><i class="fas fa-calendar-check me-2"></i> Reuniones</span>
      <i class="fas fa-chevron-down small"></i>
    </a>
    <div class="collapse ps-4" id="submenuReuniones">
      <a href="registrar_reunion.html"><i class="fas fa-user-plus me-2"></i> Registrar</a>
      <a href="reuniones.html"><i class="fas fa-list me-2"></i> Lista de reuniones</a>
    </div>
  </div>
</div>

<!-- Overlay para móvil -->
<div class="overlay" id="overlay"></div>

<!-- Contenido principal -->
<main class="content" id="main-content">
  <div class="container-fluid pt-5 mt-4">
    <div id="inicio">
      <div class="d-flex flex-column align-items-center justify-content-center" style="height: 80vh;">
        <img src="https://via.placeholder.com/200/004085/ffffff?text=Logo"
             alt="Logo de ACASA Poza Azul"
             class="mb-4 rounded-circle border border-5 border-white shadow-lg">
        <h1 class="display-4 text-center text-secondary fw-light">Proyecto ACASA Poza Azul</h1>
      </div>
    </div>
  </div>
</main>

<footer class="position-fixed bottom-0 end-0 p-3">
  <h6>Derechos Reservados Universidad de El Salvador</h6>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const sidebarToggler = document.getElementById("sidebar-toggler");
    const sidebar = document.getElementById("sidebar");
    const content = document.getElementById("main-content");
    const overlay = document.getElementById("overlay");

    sidebarToggler.addEventListener("click", function () {
      sidebar.classList.toggle("active");

      if (window.innerWidth >= 992) {
        content.classList.toggle("shifted");
      } else {
        overlay.classList.toggle("active");
      }
    });

    // Cerrar sidebar si se hace click en overlay en móvil
    overlay.addEventListener("click", function () {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });
  });
</script>
</body>
</html>
